name: Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/lanmoyan/loveblog

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to optional Aliyun registry
        if: ${{ vars.ALIYUN_REGISTRY != '' && vars.ALIYUN_IMAGE != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Login to optional Docker Hub registry
        if: ${{ vars.DOCKERHUB_IMAGE != '' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: tags
        shell: bash
        env:
          ALIYUN_IMAGE: ${{ vars.ALIYUN_IMAGE }}
          DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
        run: |
          set -euo pipefail

          images=("${GHCR_IMAGE}")
          if [[ -n "${ALIYUN_IMAGE:-}" ]]; then
            images+=("${ALIYUN_IMAGE}")
          fi
          if [[ -n "${DOCKERHUB_IMAGE:-}" ]]; then
            images+=("${DOCKERHUB_IMAGE}")
          fi

          short_sha="${GITHUB_SHA::7}"
          tags=()
          for image in "${images[@]}"; do
            tags+=("${image}:sha-${short_sha}")
            if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
              tags+=("${image}:latest")
            fi
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              tags+=("${image}:${GITHUB_REF_NAME}")
            fi
          done

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
