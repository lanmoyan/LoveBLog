name: GitHub Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v1.0.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release notes
        id: notes
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag }}"
          fi

          NOTES_FILE=".github/release-notes/${TAG_NAME}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            PREVIOUS_TAG="$(git tag --sort=-creatordate | grep -v "^${TAG_NAME}$" | head -n 1 || true)"
            {
              echo "## 更新内容"
              echo
              if [ -n "$PREVIOUS_TAG" ]; then
                git log --pretty=format:'- %s (%h)' "${PREVIOUS_TAG}..${TAG_NAME}"
              else
                git log --pretty=format:'- %s (%h)' "${TAG_NAME}"
              fi
              echo
            } > generated-release-notes.md
            NOTES_FILE="generated-release-notes.md"
          fi

          TITLE="LoveBLog ${TAG_NAME}"
          if [ "$TAG_NAME" = "v1.0.0" ]; then
            TITLE="LoveBLog v1.0.0 - 情侣博客第一个版本"
          fi

          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.notes.outputs.tag }}" >/dev/null 2>&1 && exit 0
          gh release create "${{ steps.notes.outputs.tag }}" \
            --title "${{ steps.notes.outputs.title }}" \
            --notes-file "${{ steps.notes.outputs.notes_file }}" \
            --latest \
            --verify-tag
