services:
  postgres:
    image: "${POSTGRES_IMAGE:-docker.m.daocloud.io/library/postgres:16-alpine}"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-love_next}"
      POSTGRES_USER: "${POSTGRES_USER:-love_next}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-love_next_change_me}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-love_next} -d ${POSTGRES_DB:-love_next}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  love-next:
    image: "${APP_IMAGE:-ghcr.nju.edu.cn/lanmoyan/loveblog:latest}"
    pull_policy: "${APP_PULL_POLICY:-missing}"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-love_next}:${POSTGRES_PASSWORD:-love_next_change_me}@postgres:5432/${POSTGRES_DB:-love_next}?schema=public"
      APP_NAME: "${APP_NAME:-LoveBLog}"
      AUTH_SECRET: "${AUTH_SECRET:-}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      RUN_MIGRATIONS: "${RUN_MIGRATIONS:-1}"
      NODE_OPTIONS: "${NODE_OPTIONS:---max-old-space-size=384}"
      STORAGE_DRIVER: "${STORAGE_DRIVER:-local}"
      UPLOAD_DIR: "${UPLOAD_DIR:-/app/uploads}"
      S3_ENDPOINT: "${S3_ENDPOINT:-}"
      S3_REGION: "${S3_REGION:-auto}"
      S3_BUCKET: "${S3_BUCKET:-}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      S3_PUBLIC_URL: "${S3_PUBLIC_URL:-}"
      S3_KEY_PREFIX: "${S3_KEY_PREFIX:-uploads}"
      S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE:-0}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-465}"
      SMTP_SECURE: "${SMTP_SECURE:-1}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      OAUTH_GITHUB_ID: "${OAUTH_GITHUB_ID:-}"
      OAUTH_GITHUB_SECRET: "${OAUTH_GITHUB_SECRET:-}"
      OAUTH_GOOGLE_ID: "${OAUTH_GOOGLE_ID:-}"
      OAUTH_GOOGLE_SECRET: "${OAUTH_GOOGLE_SECRET:-}"
      OAUTH_DISCORD_ID: "${OAUTH_DISCORD_ID:-}"
      OAUTH_DISCORD_SECRET: "${OAUTH_DISCORD_SECRET:-}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads-data:/app/uploads
    cpus: "${APP_CPUS:-1.0}"
    mem_limit: "${APP_MEMORY:-768m}"
    restart: unless-stopped

volumes:
  postgres-data:
  uploads-data:
